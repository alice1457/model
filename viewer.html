<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>3D Viewer</title>

<style>
  body { margin:0; background:#000; font-family:sans-serif; }

  .viewer-container {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .info-box {
    position: absolute;
    bottom: 30px;
    left: 30px;
    background: rgba(255,255,255,0.98);
    padding: 26px;
    border-radius: 20px;
    width: 650px;
    max-height: 65vh;
    overflow-y: auto;
    box-shadow: 0 12px 35px rgba(0,0,0,0.6);
    transition: 0.4s;
  }

  .info-box.hide {
    transform: translateY(120%);
    opacity: 0;
  }

  .info-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 12px;
  }

  .info-desc {
    font-size: 18px;
    line-height: 1.9;
  }

  .controls {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
  }

  .btn {
    background: #ff5722;
    color: #fff;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
  }

  .btn.stop { background: #333; }
  .btn.toggle { background: #009688; }

  .show-btn {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: #009688;
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    display: none;
  }

  @media (max-width: 768px) {
    .info-box {
      left: 10px;
      right: 10px;
      bottom: 10px;
      width: auto;
      max-height: 55vh;
    }
  }

  @media (max-width: 480px) {
    .info-box {
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 60vh;
      border-radius: 22px 22px 0 0;
      padding: 22px;
    }

    .info-title { font-size: 24px; }
    .info-desc { font-size: 20px; }

    .controls {
      top: 10px;
      right: 10px;
      flex-direction: column;
    }
  }
</style>
</head>
