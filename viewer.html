<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>3D Viewer</title>

<!-- 🔥 model-viewer -->
<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
  body { margin:0; background:#000; font-family:sans-serif; }

  .viewer-container {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  iframe, model-viewer {
    width: 100%;
    height: 100%;
    border: none;
  }

  model-viewer {
    display: none;
    background: #000;
  }

  .info-box {
    position: absolute;
    bottom: 30px;
    left: 30px;
    background: rgba(255,255,255,0.98);
    padding: 26px;
    border-radius: 20px;
    width: 650px;
    max-height: 65vh;
    overflow-y: auto;
    box-shadow: 0 12px 35px rgba(0,0,0,0.6);
    transition: 0.4s;
  }

  .info-box.hide {
    transform: translateY(120%);
    opacity: 0;
  }

  .info-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 12px;
  }

  .info-desc {
    font-size: 18px;
    line-height: 1.9;
  }

  .controls {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
  }

  .btn {
    background: #ff5722;
    color: #fff;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
  }

  .btn.stop { background: #333; }
  .btn.toggle { background: #009688; }

  .show-btn {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: #009688;
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    display: none;
  }

  @media (max-width: 480px) {
    .info-box {
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 60vh;
      border-radius: 22px 22px 0 0;
    }
  }
</style>
</head>

<body>

<div class="viewer-container">

  <!-- 🔥 Sketchfab -->
  <iframe id="viewer"></iframe>

  <!-- 🔥 Model Viewer -->
  <model-viewer id="mv"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1">
  </model-viewer>

  <!-- 📦 ข้อมูล -->
  <div class="info-box" id="infoBox">
    <div class="info-title" id="title">กำลังโหลด...</div>
    <div class="info-desc" id="desc"></div>
  </div>

  <!-- 🔊 ปุ่ม -->
  <div class="controls">
    <div class="btn" onclick="speakText()">🔊 เล่น</div>
    <div class="btn stop" onclick="stopText()">⏹ หยุด</div>
    <div class="btn toggle" onclick="toggleBox()">❌ ซ่อน</div>
  </div>

  <div class="show-btn" id="showBtn" onclick="showBox()">📄 แสดงข้อมูล</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const viewer = document.getElementById("viewer");
const mv = document.getElementById("mv");
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const infoBox = document.getElementById("infoBox");
const showBtn = document.getElementById("showBtn");

let currentText = "";

const models = {
  1: {
    type: "iframe",
    url: "https://sketchfab.com/models/9f1a53736e004dde9de2a0bc7f1ba322/embed",
    name: "วัดท่าคอย",
    desc: "วัดท่าคอย เป็นวัดสำคัญในอำเภอท่ายาง จังหวัดเพชรบุรี..."
  },
  2: {
    type: "iframe",
    url: "https://sketchfab.com/models/3e741d49aee549d78a412f086e9731c6/embed",
    name: "อุโบสถ 100 ปี",
    desc: "อุโบสถ 100 ปี เป็นโบราณสถานสำคัญ..."
  },
  3: {
    type: "iframe",
    url: "https://sketchfab.com/models/84bbddb8c8354cda8f019632cd7791ea/embed",
    name: "อุทยานปลาวัดท่าคอย",
    desc: "แหล่งอนุรักษ์ปลาน้ำจืด..."
  },
  4: {
    type: "iframe",
    url: "https://sketchfab.com/models/3acb429fbcac495dbdf60a8c773a943f/embed",
    name: "ตลาดเทศบาลท่ายาง",
    desc: "ตลาดชุมชน..."
  },

  /* 🔥 จุดที่เปลี่ยน */
  5: {
    type: "model",
    url: "ผัดไท.glb",
    name: "ร้านผัดไท 100 ปี",
    desc: "ร้านผัดไท 100 ปี เป็นร้านอาหารที่มีชื่อเสียง..."
  },
  8: {
    type: "model",
    url: "ข้าวแช่.glb",
    name: "ข้าวแช่แม่เล็กสะกิดใจ",
    desc: "ข้าวแช่เป็นอาหารไทยโบราณ..."
  },

  6: {
    type: "iframe",
    url: "https://sketchfab.com/models/b5f9a4276d6b41ba8969237c6b89f095/embed",
    name: "ร้านทองม้วนแม่เล็ก",
    desc: "ขนมพื้นบ้าน..."
  },
  7: {
    type: "iframe",
    url: "https://sketchfab.com/models/df13d2d497a54e0da8d7ddcdad6c09b5/embed",
    name: "ศาลเจ้าพ่อกวนอู",
    desc: "เทพแห่งความซื่อสัตย์..."
  },
  9: {
    type: "iframe",
    url: "https://sketchfab.com/models/23d7e59a3bec4d84abca9c5a6d77f46a/embed",
    name: "ศาลเจ้าแม่ทับทิม",
    desc: "เทพีแห่งท้องทะเล..."
  }
};

if (models[id]) {

  if (models[id].type === "model") {
    viewer.style.display = "none";
    mv.style.display = "block";
    mv.src = models[id].url;
  } else {
    mv.style.display = "none";
    viewer.style.display = "block";
    viewer.src = models[id].url;
  }

  title.innerText = "📍 " + models[id].name;
  desc.innerText = models[id].desc;
  currentText = models[id].name + " " + models[id].desc;

} else {
  title.innerText = "ไม่พบข้อมูล";
}

function speakText() {
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(currentText);
  speech.lang = "th-TH";
  speech.rate = 0.9;
  window.speechSynthesis.speak(speech);
}

function stopText() {
  window.speechSynthesis.cancel();
}

function toggleBox() {
  infoBox.classList.add("hide");
  showBtn.style.display = "block";
}

function showBox() {
  infoBox.classList.remove("hide");
  showBtn.style.display = "none";
}
</script>

</body>
</html>
