<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Viewer</title>

<style>
body {
  margin:0;
  background:#000;
  font-family: "Prompt", sans-serif;
}

.viewer-container {
  position: relative;
  width: 100%;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* 🔥 กล่องข้อมูล (กลับเป็นสีขาว) */
.info-box {
  position: absolute;
  bottom: 30px;
  left: 30px;
  width: 460px;              /* 🔥 ใหญ่ขึ้น */
  max-height: 55vh;
  overflow-y: auto;

  padding: 26px;
  border-radius: 18px;

  background: rgba(255,255,255,0.97);  /* ✅ กลับเป็นขาว */
  color: #222;

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transition: 0.4s;
}

.info-title {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 12px;
}

.info-desc {
  font-size: 17px;
  line-height: 1.8;
}

/* 🔘 ปุ่ม (กลับเป็นสีเดิม) */
.btn {
  color: #fff;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
}

.btn:nth-child(1) { background: #ff5722; } /* 🔊 เล่น */
.btn:nth-child(2) { background: #333; }     /* ⏹ หยุด */
.btn:nth-child(3) { background: #009688; }  /* ❌ ซ่อน */

/* 📱 มือถือ */
@media (max-width: 768px) {

  .info-box {
    position: fixed !important;
    top: 0 !important;
    bottom: auto !important;
    left: 0;
    right: 0;

    width: 100%;
    height: 42vh;              /* 🔥 ใหญ่ขึ้นอีก */
    
    border-radius: 0 0 20px 20px;
    padding: 22px;

    background: rgba(255,255,255,0.98); /* ขาวเหมือนเดิม */
    z-index: 9999;
  }

  .info-title {
    font-size: 22px;
  }

  .info-desc {
    font-size: 18px;
  }

  .controls {
    top: auto;
    bottom: 10px;
    right: 10px;
    flex-direction: column;
  }
}
.btn {
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  backdrop-filter: blur(6px);
}

.btn:hover {
  background: #ff5722;
}

.show-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #009688;
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  display: none;
}

/* 📱 มือถือ (สำคัญมาก) */
@media (max-width: 768px) {

  .info-box {
    position: fixed !important;
    top: 0 !important;
    bottom: auto !important;
    left: 0;
    right: 0;

    width: 100%;
    height: 40vh;

    border-radius: 0 0 20px 20px;
    background: rgba(0,0,0,0.7);

    z-index: 9999;
  }

  .info-title {
    font-size: 20px;
  }

  .info-desc {
    font-size: 16px;
  }

  .controls {
    top: auto;
    bottom: 10px;
    right: 10px;
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="viewer-container">

  <iframe id="viewer"></iframe>

  <div class="info-box" id="infoBox">
    <div class="info-title" id="title">กำลังโหลด...</div>
    <div class="info-desc" id="desc"></div>
  </div>

  <div class="controls">
    <div class="btn" onclick="speakText()">🔊</div>
    <div class="btn" onclick="stopText()">⏹</div>
    <div class="btn" onclick="toggleBox()">❌</div>
  </div>

  <div class="show-btn" id="showBtn" onclick="showBox()">📄 แสดงข้อมูล</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const viewer = document.getElementById("viewer");
const title = document.getElementById("title");
const desc = document.getElementById("desc");
const infoBox = document.getElementById("infoBox");
const showBtn = document.getElementById("showBtn");

let currentText = "";

const models = {
  1: {
    name: "วัดท่าคอย",
    url: "https://sketchfab.com/models/9f1a53736e004dde9de2a0bc7f1ba322/embed",
    desc: "วัดท่าคอย เป็นวัดสำคัญของชุมชนท่ายาง มีบรรยากาศร่มรื่นและเป็นศูนย์รวมจิตใจของชาวบ้าน"
  },
  2: {
    name: "อุโบสถ 100 ปี",
    url: "https://sketchfab.com/models/3e741d49aee549d78a412f086e9731c6/embed",
    desc: "อุโบสถเก่าแก่ที่สะท้อนศิลปะและประวัติศาสตร์ของชุมชน"
  },
  3: {
    name: "อุทยานปลา",
    url: "https://sketchfab.com/models/84bbddb8c8354cda8f019632cd7791ea/embed",
    desc: "แหล่งอนุรักษ์ปลาน้ำจืดที่สำคัญของชุมชนริมแม่น้ำ"
  },
  4: {
    name: "ตลาดท่ายาง",
    url: "https://sketchfab.com/models/3acb429fbcac495dbdf60a8c773a943f/embed",
    desc: "ศูนย์กลางการค้าขายและวิถีชีวิตของชุมชน"
  },
  5: {
    name: "ร้านผัดไท 100 ปี",
    url: "https://sketchfab.com/models/b5f9a4276d6b41ba8969237c6b89f095/embed",
    desc: "ร้านผัดไทสูตรโบราณ รสชาติเป็นเอกลักษณ์ของท่ายาง"
  },
  6: {
    name: "ร้านทองม้วน",
    url: "https://sketchfab.com/models/c812542e6dfc4852aade05dc1915006f/embed",
    desc: "ขนมพื้นบ้านขึ้นชื่อของเพชรบุรี หอม กรอบ อร่อย"
  },
  7: {
    name: "ศาลเจ้าพ่อกวนอู",
    url: "https://sketchfab.com/models/df13d2d497a54e0da8d7ddcdad6c09b5/embed",
    desc: "สถานที่ศักดิ์สิทธิ์ด้านความซื่อสัตย์และความสำเร็จ"
  },
  8: {
    name: "ข้าวแช่",
    url: "https://sketchfab.com/models/b5f9a4276d6b41ba8969237c6b89f095/embed",
    desc: "อาหารไทยโบราณที่เป็นเอกลักษณ์ของเพชรบุรี"
  },
  9: {
    name: "เจ้าแม่ทับทิม",
    url: "https://sketchfab.com/models/23d7e59a3bec4d84abca9c5a6d77f46a/embed",
    desc: "เทพีแห่งท้องทะเล ผู้คุ้มครองการเดินทาง"
  }
};

if (models[id]) {
  viewer.src = models[id].url;
  title.innerText = "📍 " + models[id].name;
  desc.innerText = models[id].desc;
  currentText = models[id].name + " " + models[id].desc;
} else {
  title.innerText = "ไม่พบข้อมูล";
}

// 🔊 เสียง
function speakText() {
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(currentText);
  speech.lang = "th-TH";
  window.speechSynthesis.speak(speech);
}

function stopText() {
  window.speechSynthesis.cancel();
}

// ❌ ซ่อน
function toggleBox() {
  infoBox.classList.add("hide");
  showBtn.style.display = "block";
}

// 📄 แสดง
function showBox() {
  infoBox.classList.remove("hide");
  showBtn.style.display = "none";
}
</script>

</body>
</html>
