<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Viewer</title>

<style>
body {
  margin:0;
  background:#000;
  font-family:sans-serif;
}

/* container */
.viewer-container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* iframe (ลดปัญหาทับ layer) */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  position: relative;
  z-index: 1;
}

/* 🔥 กล่องข้อมูล (desktop) */
.info-box {
  position: absolute;
  bottom: 30px;
  left: 30px;
  background: rgba(255,255,255,0.98);
  padding: 24px;
  border-radius: 20px;
  width: 420px;
  max-height: 50vh;
  overflow-y: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  z-index: 9999; /* 🔥 สำคัญ */
}

.info-title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
}

.info-desc {
  font-size: 16px;
  line-height: 1.7;
}

/* ปุ่ม */
.controls {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  gap: 10px;
}

.btn {
  background: #ff5722;
  color: #fff;
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
}

.btn.stop { background:#333; }

/* 📱 Mobile FIX จริง */
@media (max-width: 768px) {

  .info-box {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: auto !important;

    width: 100% !important;
    height: 38vh !important;

    border-radius: 0 0 20px 20px;
    padding: 18px;

    z-index: 99999 !important;
  }

  .info-title {
    font-size: 22px;
  }

  .info-desc {
    font-size: 17px;
  }

  /* ปุ่มลงล่าง */
  .controls {
    top: auto;
    bottom: 10px;
    right: 10px;
    flex-direction: column;
  }

}
</style>
</head>

<body>

<div class="viewer-container">

  <iframe id="viewer"></iframe>

  <div class="info-box">
    <div class="info-title" id="title">กำลังโหลด...</div>
    <div class="info-desc" id="desc"></div>
  </div>

  <div class="controls">
    <div class="btn" onclick="speakText()">🔊</div>
    <div class="btn stop" onclick="stopText()">⏹</div>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const viewer = document.getElementById("viewer");
const title = document.getElementById("title");
const desc = document.getElementById("desc");

let currentText = "";

const models = {
  1: {
    name: "วัดท่าคอย",
    url: "https://sketchfab.com/models/9f1a53736e004dde9de2a0bc7f1ba322/embed",
    desc: "วัดสำคัญของชุมชนท่ายาง เป็นศูนย์รวมจิตใจและแหล่งท่องเที่ยว"
  },
  2: {
    name: "อุโบสถ",
    url: "https://sketchfab.com/models/3e741d49aee549d78a412f086e9731c6/embed",
    desc: "สถานที่ประกอบพิธีกรรมทางศาสนา"
  },
  3: {
    name: "อุทยานปลา",
    url: "https://sketchfab.com/models/84bbddb8c8354cda8f019632cd7791ea/embed",
    desc: "แหล่งอนุรักษ์ปลาธรรมชาติ"
  },
  4: {
    name: "ตลาด",
    url: "https://sketchfab.com/models/3acb429fbcac495dbdf60a8c773a943f/embed",
    desc: "ศูนย์กลางการค้าขายของชุมชน"
  },
  5: {
    name: "ผัดไท",
    url: "https://sketchfab.com/models/b5f9a4276d6b41ba8969237c6b89f095/embed",
    desc: "อาหารพื้นบ้านขึ้นชื่อ"
  }
};

if (models[id]) {
  viewer.src = models[id].url;
  title.innerText = "📍 " + models[id].name;
  desc.innerText = models[id].desc;
  currentText = models[id].name + " " + models[id].desc;
} else {
  title.innerText = "ไม่พบข้อมูล";
}

/* 🔊 เสียง */
function speakText() {
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(currentText);
  speech.lang = "th-TH";
  window.speechSynthesis.speak(speech);
}

function stopText() {
  window.speechSynthesis.cancel();
}
</script>

</body>
</html>
