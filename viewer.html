<title>3D Viewer</title>

<style>
body {
  margin:0;
  background:#000;
  font-family: "Prompt", sans-serif;
}

.viewer-container {
  position: relative;
  width: 100%;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* 🔥 กล่องข้อมูล (ขาว สวย อ่านง่าย) */
.info-box {
  position: absolute;
  bottom: 30px;
  left: 30px;
  width: 460px;
  max-height: 55vh;
  overflow-y: auto;

  padding: 26px;
  border-radius: 18px;

  background: #ffffff;
  color: #222;

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.4s;
  z-index: 9999;
}

.info-box.hide {
  transform: translateY(120%);
  opacity: 0;
}

.info-title {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 12px;
}

.info-desc {
  font-size: 17px;
  line-height: 1.8;
}

/* 🔘 ปุ่ม */
.controls {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 10px;
  z-index: 9999;
}

.btn {
  color: #fff;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

/* 🎨 สีปุ่ม */
.btn.play { background: #ff5722; }
.btn.stop { background: #333; }
.btn.hide { background: #009688; }

/* 📄 ปุ่มแสดง */
.show-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #009688;
  color: #fff;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  display: none;
  z-index: 9999;
}

/* 📱 Mobile */
@media (max-width: 768px) {

  .info-box {
    position: fixed !important;
    top: 0 !important;
    left: 0;
    right: 0;
    bottom: auto;

    width: 90%;
    /* height: 20vh; */

    border-radius: 0 0 20px 20px;
    padding: 21px;

    background: #ffffff;
  }

  .info-title {
    font-size: 18px;
  }

  .info-desc {
    font-size: 14px;
  }

  .controls {
    top: auto;
    bottom: 10px;
    right: 10px;
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="viewer-container">

  <iframe id="viewer"></iframe>

  <div class="info-box" id="infoBox">
    <div class="info-title" id="title">กำลังโหลด...</div>
    <div class="info-desc" id="desc"></div>
  </div>

  <div class="controls">
    <div class="btn play" onclick="speakText()">🔊</div>
    <div class="btn stop" onclick="stopText()">⏹</div>
    <div class="btn hide" onclick="toggleBox()">❌</div>
  </div>

  <div class="show-btn" id="showBtn" onclick="showBox()">📄 แสดงข้อมูล</div>

</div>
