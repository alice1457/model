<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>3D Viewer</title>

<style>
body {
  margin:0;
  background:#000;
  font-family:sans-serif;
}

/* 🔥 แก้สำคัญ: แยก layout เป็น 2 ส่วน */
.viewer-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* 🔥 กล่องข้อมูล (อยู่บน) */
.info-box {
  background: #fff;
  padding: 18px;
  height: 35vh;
  overflow-y: auto;
  border-radius: 0 0 20px 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
  z-index: 10;
}

.info-title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.info-desc {
  font-size: 16px;
  line-height: 1.6;
}

/* 🔥 iframe อยู่ล่าง */
.viewer-frame {
  flex: 1;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* 🔥 ปุ่ม */
.controls {
  position: fixed;
  right: 10px;
  bottom: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 20;
}

.btn {
  background: #ff5722;
  color: #fff;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
}

.btn.stop { background:#333; }
.btn.toggle { background:#009688; }

/* 💻 Desktop */
@media (min-width: 768px) {

  .viewer-container {
    display: block;
  }

  .info-box {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 400px;
    height: auto;
  }

  .viewer-frame {
    height: 100vh;
  }
}
</style>
</head>

<body>

<div class="viewer-container">

  <!-- 🔥 กล่องบน -->
  <div class="info-box" id="infoBox">
    <div class="info-title" id="title">กำลังโหลด...</div>
    <div class="info-desc" id="desc"></div>
  </div>

  <!-- 🔥 โมเดลล่าง -->
  <div class="viewer-frame">
    <iframe id="viewer"></iframe>
  </div>

</div>

<div class="controls">
  <div class="btn" onclick="speakText()">🔊 เล่น</div>
  <div class="btn stop" onclick="stopText()">⏹ หยุด</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const viewer = document.getElementById("viewer");
const title = document.getElementById("title");
const desc = document.getElementById("desc");

let currentText = "";

const models = {
  1: {
    name: "วัดท่าคอย",
    url: "https://sketchfab.com/models/9f1a53736e004dde9de2a0bc7f1ba322/embed",
    desc: "วัดสำคัญของอำเภอท่ายาง บรรยากาศร่มรื่น และเป็นศูนย์กลางชุมชน"
  },
  2: {
    name: "อุโบสถ",
    url: "https://sketchfab.com/models/3e741d49aee549d78a412f086e9731c6/embed",
    desc: "สถานที่ประกอบพิธีกรรมทางศาสนา"
  }
};

if (models[id]) {
  viewer.src = models[id].url;
  title.innerText = "📍 " + models[id].name;
  desc.innerText = models[id].desc;
  currentText = models[id].name + " " + models[id].desc;
}

function speakText() {
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(currentText);
  speech.lang = "th-TH";
  window.speechSynthesis.speak(speech);
}

function stopText() {
  window.speechSynthesis.cancel();
}
</script>

</body>
</html>
