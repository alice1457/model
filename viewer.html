<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>3D Viewer</title>

<style>
  body { margin:0; background:#000; font-family:sans-serif; }

  .viewer-container {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .info-box {
    position: absolute;
    bottom: 30px;
    left: 30px;
    background: rgba(255,255,255,0.98);
    padding: 26px;
    border-radius: 20px;
    width: 650px;
    max-height: 65vh;
    overflow-y: auto;
    box-shadow: 0 12px 35px rgba(0,0,0,0.6);
    transition: 0.4s;
  }

  .info-box.hide {
    transform: translateY(120%);
    opacity: 0;
  }

  .info-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 12px;
  }

  .info-desc {
    font-size: 18px;
    line-height: 1.9;
  }

  .controls {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
  }

  .btn {
    background: #ff5722;
    color: #fff;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
  }

  .btn.stop { background: #333; }
  .btn.toggle { background: #009688; }

  .show-btn {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: #009688;
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    display: none;
  }

  @media (max-width: 768px) {
    .info-box {
      left: 10px;
      right: 10px;
      bottom: 10px;
      width: auto;
      max-height: 55vh;
    }
  }

  @media (max-width: 480px) {
    .info-box {
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 60vh;
      border-radius: 22px 22px 0 0;
      padding: 22px;
    }

    .info-title { font-size: 24px; }
    .info-desc { font-size: 20px; }

    .controls {
      top: 10px;
      right: 10px;
      flex-direction: column;
    }
  }
</style>
</head>

<body>

<div class="viewer-container">

  <iframe id="viewer"></iframe>

  <div class="info-box" id="infoBox">
    <div class="info-title" id="title">กำลังโหลด...</div>
    <div class="info-desc" id="desc"></div>
  </div>

  <div class="controls">
    <div class="btn" onclick="speakText()">🔊 เล่น</div>
    <div class="btn stop" onclick="stopText()">⏹ หยุด</div>
    <div class="btn toggle" onclick="toggleBox()">❌ ซ่อน</div>
  </div>

  <div class="show-btn" id="showBtn" onclick="showBox()">📄 แสดงข้อมูล</div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const viewer = document.getElementById("viewer");
  const title = document.getElementById("title");
  const desc = document.getElementById("desc");
  const infoBox = document.getElementById("infoBox");

    },
    2: {
      name: "อุโบสถ 100 ปี",
      url: "https://sketchfab.com/models/3e741d49aee549d78a412f086e9731c6/embed",
      desc: "อุโบสถ 100 ปี เป็นโบราณสถานสำคัญที่สะท้อนถึงประวัติศาสตร์และความเจริญรุ่งเรืองของพระพุทธศาสนาในชุมชน..."

    7: {

      desc: "ศาลเจ้าแม่ทับทิม เป็นสถานที่ศักดิ์สิทธิ์..."
    }
  };

  if (models[id]) {
    viewer.src = models[id].url;
    title.innerText = "📍 " + models[id].name;
    desc.innerText = models[id].desc;
    currentText = models[id].name + " " + models[id].desc;
  } else {
    title.innerText = "ไม่พบข้อมูล";
  }

  function speakText() {
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(currentText);
    speech.lang = "th-TH";
    speech.rate = 0.9;
    window.speechSynthesis.speak(speech);
  }

  function stopText() {
    window.speechSynthesis.cancel();
  }

  function toggleBox() {
    infoBox.classList.add("hide");
    showBtn.style.display = "block";
  }

  function showBox() {
    infoBox.classList.remove("hide");
    showBtn.style.display = "none";
  }
</script>

</body>
</html>
